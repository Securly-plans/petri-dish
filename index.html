<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microscope.net</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🦠 Microscope.net</h1>

    <div id="coins">Coins: 0</div>

    <div id="collection-progress"></div>
    
    <div class="pack-box">
      <p>Open a Petri Pack!</p>

      <div class="pack-select">
  <button onclick="selectPack('MicroLoot')">MicroLoot</button>
  <button onclick="selectPack('BioBox')">BioBox</button>
  <button onclick="selectPack('CellCraze')">CellCraze</button>
</div>

<div id="pack-info"></div>


    <div id="info-panel" class="hidden">
  <div class="info-content">
    <span onclick="closeInfo()" class="close-btn">✖</span>
    <img id="info-img">
    <h2 id="info-name"></h2>
    <p id="info-rarity"></p>
    <p id="info-desc"></p>
  </div>
</div>

      
      <button onclick="openPack()">Open Pack</button>
      <div id="result"></div>
    </div>
    
    <div id="inventory"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
